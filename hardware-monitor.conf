# Hardware Monitor Configuration File
# 硬件监控配置文件

# 监控间隔（秒）
INTERVAL=3

# 风扇控制策略 (auto/manual/none)
# auto: 根据温度自动调节
# manual: 只监控不控制
# none: 只显示温度
STRATEGY=auto

# 温度阈值配置（摄氏度）
# CPU温度阈值
CPU_TEMP_HIGH=80
CPU_TEMP_MEDIUM=70
CPU_TEMP_LOW=60
CPU_TEMP_MIN=50

# GPU温度阈值
GPU_TEMP_HIGH=70

# 内存温度阈值
MEM_TEMP_HIGH=60

# 风扇转速配置（百分比）
FAN_SPEED_MAX=90
FAN_SPEED_HIGH=60
FAN_SPEED_MEDIUM=40
FAN_SPEED_LOW=20
FAN_SPEED_MIN=8

# 日志级别 (0=禁用, 1=错误, 2=警告, 3=信息, 4=调试)
LOG_LEVEL=3

# 是否启用IPMI控制
ENABLE_IPMI=true
