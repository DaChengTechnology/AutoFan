# Hardware Monitor Configuration File
# 硬件温度监控和风扇控制配置

# 监控间隔(秒)
INTERVAL=3

# 风扇控制策略 (auto/manual/none)
STRATEGY=auto

# CPU温度阈值(摄氏度)
CPU_TEMP_HIGH=80
CPU_TEMP_MEDIUM=70
CPU_TEMP_LOW=60
CPU_TEMP_MIN=50

# GPU温度阈值(摄氏度)
GPU_TEMP_HIGH=70

# 内存温度阈值(摄氏度)
MEM_TEMP_HIGH=60

# 风扇转速百分比(0-100)
FAN_SPEED_MAX=100
FAN_SPEED_HIGH=80
FAN_SPEED_MEDIUM=60
FAN_SPEED_LOW=45
FAN_SPEED_MIN=30

# 日志级别(1-5)
LOG_LEVEL=3

# 启用IPMI控制
ENABLE_IPMI=true
